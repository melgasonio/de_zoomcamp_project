version: 2

models:
  - name: int_orders_enriched
    description: Intermediate model enriching orders with total_price.
    columns:
      - name: invoice_no
        tests:
          - not_null
      - name: stock_code
        tests:
          - not_null
          - relationships: 
              to: ref('dim_products')
              field: id
      - name: description
        tests:
          - not_null
      - name: invoice_date
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: country
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: total_price
        description: quantity * unit_price
        tests:
          - not_null